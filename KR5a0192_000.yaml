front:
  text: 大上上清禳災延壽寳懴結二太上曰若有清信男子清信女人年災月厄疾病纏綿官府連累口舌謗讟誣誷闇昧不能自明抑滯迍邅所求乖戾凡事轗軻所作不遂所圖不成當於自身本命日甲子日庚申日三元日八節日逐月三七日或祖先父母逺忌之日設三清聖像以時果香花旛燈供養躬自禮誦此懴悔文或請道士禮誦禳謝作如是言懴悔弟子某伏自生居人世長寓中華荷天地亭育之恩處日月照臨之下或命犯衝破運屬魁罡行年所值天羅地網暗耀惡星經纏命位或起造葬埋築室動土或經營制作遷徙出遊不避禁方觸犯神煞或呼迎聚㑹不擇良辰動作攺更誤當醜日或破闘交易間諜親朋或魔障善道妄解正論起人怨嗟被人呪詛結託權勢坑䧟忠良倚恃尊强抑壓卑弱奪他玩好不顧仁義是乃人興怨謗之心鬼伺災衰之隙減人福禄奪人壽齡遂致釁積幽㝠終爲陽報殃墮九祖延及子孫今對聖前咸悉懴悔稽首䖍誠歸命信禮上清普慈護世諸尊聖號
