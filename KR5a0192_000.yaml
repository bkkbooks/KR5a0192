body:
  text: 歸命信禮上清眞境天尊歸命信禮含弘藴素天尊歸命信禮延壽益筭天尊歸命信禮消災息難天尊歸命信禮恵愛仁慈天尊歸命信禮資生化育天尊歸命信禮含元融理天尊歸命信禮紫府茂德天尊歸命信禮沖頥翊賛天尊歸命信禮廣施大辨天尊歸命信禮通神廣博天尊歸命信禮玄機赴感天尊歸命信禮妙智圓明天尊歸命信禮明眞養浩天尊歸命信禮玉宸隆宥天尊歸命信禮熈皇妙寂天尊歸命信禮九眞御極天尊歸命信禮逍遥八景天尊歸命信禮舍融萬德天尊歸命信禮三皇度世天尊歸命信禮垂化顯道天尊歸命信禮崇眞住世天尊歸命信禮玉符金籙天尊歸命信禮玉章羽葆天尊歸命信禮矚遐衍慶天尊歸命信禮消災延壽眞人歸命信禮宥過賜福眞人弟子某式憑眞誥䖍禮上眞懇禱至誠一心懴悔某自從無始巳來或爲宰官或爲執事掌國樞命申令典刑横恣權勢不務正理欺公枉法紊亂紀綱蔽匿明賢依附姧黨上壅天聽下遏民情忠告善道不得通達苦虐無申受賄曲刑恣縱狡吏損害良善鬻貴買賤誅剥細民虧公損私不分善惡濫刑弛政不鑒曲直不察疾苦不問饑渴上來往業當墮地獄長劫受苦苦盡復生或爲餓鬼或爲畜生往復循環百千萬劫報盡復還生于兹世以前業故當受餘殃弟子某自從無始巳來或爲巫覡音檄或爲醫卜假託邪鬼詐取資財合造毒藥増益病勢因爲卜筮厭禱鬼神侵損他財自益己用上來往業當墮地獄長劫受苦苦盡復生或爲餓鬼或爲畜生往復循環百千萬劫報盡復還生于兹世以前業故尚受餘殃弟子某自從無始巳来或居市井專事商賈音古興販貿易全虧仁義欺誷取利將粗揉精飾僞亂眞悞他適用大秤小斗種種百爲惟賄所覬音冀常懷詐欺上來往業當墮地獄長劫受苦苦盡復生或爲餓鬼或爲畜生往復循環百千萬劫報盡復還生于兹世以前業故尚受餘殃弟子某自從無始巳來不識正道不辨邪眞貪色好財嫌貧逐冨奔竸名利不務謙仁親近囂浮不奉甘㫖見利忘義侮聖慢賢或對虚空露身裸體日月星辰相對便利或怒天地或怨寒暑或指虹蜺或唾流星或設呪誓或罵鬼神上來往業當墮地獄長劫受苦苦盡復生或爲餓鬼或爲畜生往復循環百千萬劫報盡復還生于兹世以前業故尚受餘殃今對聖前咸悉懴悔歸命信禮普慈護世諸尊聖號歸命信禮妙解脫境天尊歸命信禮無量光明天尊歸命信禮包容萬𩔖天尊歸命信禮攝魔屏穢天尊歸命信禮常護持天尊歸命信禮德自在天尊歸命信禮妙度天尊歸命信禮妙化天尊歸命信禮無邊樂天尊歸命信禮靜樂境天尊歸命信禮垂德化道天尊歸命信禮保道至精天尊歸命信禮寳境嚴淨天尊歸命信禮紫清妙境天尊歸命信禮樂育德天尊歸命信禮持正行天尊歸命信禮化物天尊歸命信禮利物天尊歸命信禮德光常曜天尊歸命信禮器含萬象天尊歸命信禮保扶虚界天尊歸命信禮溥濟情𩔖天尊歸命信禮大慈大恵眞人歸命信禮拔苦度厄眞人弟子某式憑眞誥䖍禮上眞懇禱至誠一心懴悔某自念受靈微賤禀性𡨋頑仰荷洪休得親正教功虧毫髮過積丘山今啓下誠仰投上聖披肝露膽謝罪首愆幸鑒愚誠少回靈貺赦千非於旣往允荷慈恩錫百福於方來長承道䕃一門康泰九祖遷昇所願諧和所求稱遂凡於動靜實頼生成某無任志誠懇禱之至太上上清禳災延壽寳懴
